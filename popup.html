<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
      width: 200px; 
      padding: 15px; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background-color: #1e1f20; 
      color: #e3e3e3;
      margin: 0;
    }
    .header {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 15px;
      text-align: center;
      color: #8ab4f8;
    }
    button { 
      width: 100%; 
      margin: 6px 0; 
      padding: 10px; 
      cursor: pointer; 
      border-radius: 8px; 
      border: 1px solid #444746; 
      background-color: #2b2c2f; 
      color: #e3e3e3;
      font-size: 13px;
      transition: all 0.2s ease;
      outline: none;
    }
    button:hover {
      background-color: #37393b;
      border-color: #5f6368;
    }
    button.active {
      background-color: rgba(0, 230, 118, 0.1);
      border: 1px solid #00e676;
      color: #00e676;
      font-weight: bold;
      box-shadow: 0 0 8px rgba(0, 230, 118, 0.2);
    }
  </style>
</head>
<body>
  <div class="header">Quiz Mode</div>
  <button id="off" class="active">Off</button>
  <button id="highlight">Highlight</button>
  <script src="popup.js"></script>
</body>
</html>
